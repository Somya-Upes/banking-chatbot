services:
  - type: web
    name: banking-chatbot-backend
    env: python
    plan: free
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: PIP_EXTRA_INDEX_URL
        value: "https://download.pytorch.org/whl/cpu"

  - type: web
    name: banking-chatbot-frontend
    env: static
    buildCommand: cd frontend && npm install --include=dev && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: banking-chatbot-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: NODE_VERSION
        value: "20"
